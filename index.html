<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Churrería App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<!-- Pantalla de inicio -->
<div id="inicio">
  <h1>Churrería App</h1>
  <button onclick="mostrarSeccion('comprar')">Quiero comprar</button>
  <button onclick="mostrarSeccion('vender')">Quiero vender</button>
</div>

<!-- Sección Comprar -->
<div id="comprar" class="section">
  <button onclick="volverInicio()">← Volver</button>
  <h2>Comprar Productos</h2>

  <input type="text" id="buscarNombre" placeholder="Buscar churrero">
  <button onclick="buscarChurreros()">Buscar</button>
  <div id="listaChurreros"></div>

  <h3>Crear Pedido</h3>
  <select id="pedidoChurrero"></select>
  <select id="pedidoProducto" onchange="actualizarTotal()"></select>
  <p id="totalPedido">Total: S/0</p>

  <button onclick="crearPedido()">Crear Pedido</button>
  <button onclick="cancelarPedido()">Cancelar Último Pedido</button>

  <div id="pedidos"></div>

  <h3>Mensajes</h3>
  <select id="mensajeChurrero"></select>
  <input type="text" id="mensajeTexto" placeholder="Escribe tu mensaje">
  <button onclick="enviarMensaje()">Enviar</button>
  <div id="mensajes"></div>
</div>

<!-- Sección Vender -->
<div id="vender" class="section">
  <button onclick="volverInicio()">← Volver</button>
  <h2>Administrar Productos</h2>

  <h3>Agregar producto</h3>
  <input type="text" id="nuevoNombre" placeholder="Nombre del producto">
  <input type="number" id="nuevoPrecio" placeholder="Precio" min="1" step="0.01">
  <button onclick="agregarProducto()">Agregar</button>

  <h3>Editar precio</h3>
  <select id="productoSelect"></select>
  <input type="number" id="editarPrecio" placeholder="Nuevo precio" min="1" step="0.01">
  <button onclick="actualizarPrecio()">Actualizar</button>

  <h3>Lista de productos</h3>
  <div id="listaProductos"></div>
</div>
  

<script>

// DATOS
let churreros = JSON.parse(localStorage.getItem('churreros')) || [
  {idChurrero:1, nombreVendedor:"Carlos", tel:"123456", horario:"10:00 - 20:00"},
  {idChurrero:2, nombreVendedor:"Ana", tel:"987654", horario:"11:00 - 21:00"}
];

let productos = JSON.parse(localStorage.getItem('productos')) || [
  {idProducto:1, nombre:"Churro Chocolate", precio:50},
  {idProducto:2, nombre:"Churro Dulce de Leche", precio:60}
];

let pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];
let mensajes = JSON.parse(localStorage.getItem('mensajes')) || [];

function guardarDatos() {
  localStorage.setItem('pedidos', JSON.stringify(pedidos));
  localStorage.setItem('mensajes', JSON.stringify(mensajes));
  localStorage.setItem('productos', JSON.stringify(productos));
}

// SECCIONES
function mostrarSeccion(sec) {
  document.getElementById('inicio').style.display = 'none';

  document.querySelectorAll('.section').forEach(s => {
    s.style.display = 'none';
    s.classList.remove("fade");
  });

  let seccion = document.getElementById(sec);

  if (seccion) {
    seccion.style.display = 'block';
    setTimeout(() => seccion.classList.add("fade"), 10);
  }
}

function volverInicio() {
  document.querySelectorAll('.section').forEach(s => {
    s.style.display = 'none';
    s.classList.remove("fade");
  });

  let inicio = document.getElementById('inicio');
  inicio.style.display = 'block';

  setTimeout(() => inicio.classList.add("fade"), 10);
}

// SELECTS
function cargarChurreros() {
  let select1 = document.getElementById("pedidoChurrero");
  let select2 = document.getElementById("mensajeChurrero");

  select1.innerHTML = "";
  select2.innerHTML = "";

  churreros.forEach(c => {
    let o1 = document.createElement("option");
    o1.value = c.idChurrero;
    o1.text = `${c.nombreVendedor} (${c.horario})`;
    select1.add(o1);

    let o2 = document.createElement("option");
    o2.value = c.idChurrero;
    o2.text = c.nombreVendedor;
    select2.add(o2);
  });
}

// BUSCAR
function buscarChurreros() {
  let input = document.getElementById("buscarNombre").value.toLowerCase();
  let lista = document.getElementById("listaChurreros");
  lista.innerHTML = "";

  let encontrados = churreros.filter(c => 
    c.nombreVendedor.toLowerCase().includes(input)
  );

  if(encontrados.length === 0){
    lista.innerHTML = "<p>No se encontraron resultados</p>";
    return;
  }

  encontrados.forEach(c => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<b>${c.nombreVendedor}</b><br>Tel: ${c.tel}<br>${c.horario}`;
    lista.appendChild(div);
  });
}

// PEDIDOS
function crearPedido() {
  let id = parseInt(document.getElementById("pedidoChurrero").value);
  let productoSeleccionado = document.getElementById("pedidoProducto").value;

  if(!productoSeleccionado){
    alert("Seleccioná un producto");
    return;
  }

  let pedido = {
    id: pedidos.length + 1,
    idChurrero: id,
    productos: productoSeleccionado,
    estado: "pendiente"
  };

  pedidos.push(pedido);
  guardarDatos();
  mostrarPedidos();
  alert("Pedido creado");

  actualizarTotal();
}

function mostrarPedidos() {
  let div = document.getElementById("pedidos");
  div.innerHTML = "";

  pedidos.forEach(p => {
    let c = churreros.find(ch => ch.idChurrero === p.idChurrero);
    div.innerHTML += `<div class="card">
      Pedido #${p.id} - ${c.nombreVendedor}<br>${p.productos}
    </div>`;
  });
}

function cancelarPedido() {
  if(pedidos.length === 0){
    alert("No hay pedidos");
    return;
  }

  let p = pedidos.pop();
  guardarDatos();
  mostrarPedidos();
  alert(`Pedido #${p.id} cancelado`);
}

// TOTAL
function actualizarTotal() {
  let nombre = document.getElementById("pedidoProducto").value;
  let producto = productos.find(p => p.nombre === nombre);

  let total = producto ? producto.precio : 0;

  document.getElementById("totalPedido").innerText = `Total: S/${total}`;
}

// MENSAJES
function enviarMensaje() {
  let id = parseInt(document.getElementById("mensajeChurrero").value);
  let texto = document.getElementById("mensajeTexto").value;

  if(!texto){
    alert("Escribí un mensaje");
    return;
  }

  mensajes.push({idChurrero:id, texto:texto});
  guardarDatos();
  mostrarMensajes();
}

function mostrarMensajes() {
  let div = document.getElementById("mensajes");
  div.innerHTML = "";

  mensajes.forEach(m => {
    let c = churreros.find(ch => ch.idChurrero === m.idChurrero);
    div.innerHTML += `<div class="card"><b>${c.nombreVendedor}</b>: ${m.texto}</div>`;
  });
}

// PRODUCTOS
function cargarProductosEnPedido() {
  let select = document.getElementById("pedidoProducto");
  select.innerHTML = "";

  productos.forEach(p => {
    let option = document.createElement("option");
    option.value = p.nombre;
    option.text = `${p.nombre} - S/${p.precio}`;
    select.add(option);
  });
}

function cargarProductos() {
  let select = document.getElementById("productoSelect");
  let lista = document.getElementById("listaProductos");

  select.innerHTML = "";
  lista.innerHTML = "";

  productos.forEach(p => {
    let o = document.createElement("option");
    o.value = p.idProducto;
    o.text = `${p.nombre} - S/${p.precio}`;
    select.add(o);

    lista.innerHTML += `<div class="card">${p.nombre} - S/${p.precio}</div>`;
  });
}
function actualizarPrecio() {
  let id = parseInt(document.getElementById("productoSelect").value);
  let precio = parseFloat(document.getElementById("editarPrecio").value);

  if (isNaN(precio) || precio <= 0) {
    alert("Ingresá un precio válido");
    return;
  }

  let prod = productos.find(p => p.idProducto === id);
  prod.precio = precio;

  guardarDatos();
  cargarProductos();
  cargarProductosEnPedido();

  alert("Precio actualizado");
}

  let prod = productos.find(p => p.idProducto === id);
  prod.precio = precio;

  function agregarProducto() {
  let nombre = document.getElementById("nuevoNombre").value.trim();
  let precio = parseFloat(document.getElementById("nuevoPrecio").value);

  if (!nombre) {
    alert("Ingresá un nombre");
    return;
  }

  if (isNaN(precio) || precio <= 0) {
    alert("Ingresá un precio válido");
    return;
  }

  let nuevo = {
    idProducto: productos.length + 1,
    nombre: nombre,
    precio: precio
  };

  productos.push(nuevo);
  guardarDatos();

  cargarProductos();
  cargarProductosEnPedido();

  document.getElementById("nuevoNombre").value = "";
  document.getElementById("nuevoPrecio").value = "";

  alert("Producto agregado");
}

// INIT
cargarProductosEnPedido();
cargarChurreros();
mostrarPedidos();
mostrarMensajes();
cargarProductos();
actualizarTotal();

// VALIDACIÓN INPUT PRECIO
document.querySelectorAll("input[type='number']").forEach(input => {
  input.addEventListener("input", function () {
    this.value = this.value.replace(/[^0-9.]/g, '');
  });
});
  
</script>

</body>
</html>
