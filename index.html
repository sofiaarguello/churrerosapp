<h1>Churrería App Mejorada</h1><h2>Buscar Churreros</h2><input type="text" id="buscarNombre" placeholder="Nombre del churrero"><button onclick="buscarChurreros()">Buscar</button><div id="listaChurreros"></div><h2>Crear Pedido</h2><select id="pedidoChurrero"></select><input type="text" id="pedidoProducto" placeholder="Productos separados por coma"><button onclick="crearPedido()">Crear Pedido</button><button onclick="cancelarPedido()">Cancelar Último Pedido</button><div id="pedidos"></div><h2>Mensajes</h2><select id="mensajeChurrero"></select><input type="text" id="mensajeTexto" placeholder="Escribe tu mensaje"><button onclick="enviarMensaje()">Enviar Mensaje</button><div id="mensajes"></div><h2>Administrar Productos</h2><select id="productoSelect"></select><input type="number" id="nuevoPrecio" placeholder="Nuevo precio"><button onclick="actualizarPrecio()">Actualizar Precio</button><div id="listaProductos"></div><script>// Datos iniciales y localStoragelet usuarios = JSON.parse(localStorage.getItem('usuarios')) || [{idUsuario:1, nombre:"Sofía"}];let churreros = JSON.parse(localStorage.getItem('churreros')) || [  {idChurrero:1, nombreVendedor:"Carlos", tel:"123456", horario:"10:00 - 20:00"},  {idChurrero:2, nombreVendedor:"Ana", tel:"987654", horario:"11:00 - 21:00"}];let productos = JSON.parse(localStorage.getItem('productos')) || [  {idProducto:1, nombre:"Churro Chocolate", descripcion:"Churro con chocolate", precio:50},  {idProducto:2, nombre:"Churro Dulce de Leche", descripcion:"Churro con dulce de leche", precio:60}];let mensajes = JSON.parse(localStorage.getItem('mensajes')) || [];let pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];// Guardar en localStoragefunction guardarDatos() {  localStorage.setItem('usuarios', JSON.stringify(usuarios));  localStorage.setItem('churreros', JSON.stringify(churreros));  localStorage.setItem('productos', JSON.stringify(productos));  localStorage.setItem('mensajes', JSON.stringify(mensajes));  localStorage.setItem('pedidos', JSON.stringify(pedidos));}// Mostrar churreros en selectsfunction mostrarChurrerosSelect() {  let selectPedido = document.getElementById("pedidoChurrero");  let selectMensaje = document.getElementById("mensajeChurrero");  selectPedido.innerHTML = "";  selectMensaje.innerHTML = "";  churreros.forEach(c => {    let opt1 = document.createElement("option");    opt1.value = c.idChurrero;    opt1.text = ${c.nombreVendedor} (${c.horario});    selectPedido.add(opt1);    let opt2 = document.createElement("option");    opt2.value = c.idChurrero;    opt2.text = c.nombreVendedor;    selectMensaje.add(opt2);  });}// Buscar churrerosfunction buscarChurreros() {  let input = document.getElementById("buscarNombre").value.toLowerCase();  let lista = document.getElementById("listaChurreros");  lista.innerHTML = "";  let encontrados = churreros.filter(c => c.nombreVendedor.toLowerCase().includes(input));  encontrados.forEach(c => {    let div = document.createElement("div");    div.className = "churrero";    div.innerHTML = <b>${c.nombreVendedor}</b> - Tel: ${c.tel} - Horario: ${c.horario};    lista.appendChild(div);  });}// Crear pedidofunction crearPedido() {  let idChurrero = parseInt(document.getElementById("pedidoChurrero").value);  let productosTexto = document.getElementById("pedidoProducto").value.split(",").map(p => p.trim());  let listaProductos = productos.filter(prod => productosTexto.includes(prod.nombre));  if(listaProductos.length === 0) { alert("No hay productos válidos"); return; }  let pedido = {    idPedido: pedidos.length + 1,    idUsuario: 1,    idChurrero: idChurrero,    listaProductos: listaProductos,    estado: "pendiente"  };  pedidos.push(pedido);  guardarDatos();  mostrarPedidos();}// Mostrar pedidosfunction mostrarPedidos() {  let div = document.getElementById("pedidos");  div.innerHTML = "";  pedidos.forEach(p => {    let c = churreros.find(ch => ch.idChurrero === p.idChurrero);    let divPedido = document.createElement("div");    divPedido.className = "pedido";    divPedido.innerHTML = <b>Pedido #${p.idPedido}</b> - Churrero: ${c.nombreVendedor} - Estado: ${p.estado} <br> Productos: ${p.listaProductos.map(pr => pr.nombre).join(", ")};    div.appendChild(divPedido);  });}// Cancelar último pedidofunction cancelarPedido() {  if(pedidos.length === 0) return alert("No hay pedidos para cancelar");  let pedido = pedidos.pop();  guardarDatos();  mostrarPedidos();  alert(Pedido #${pedido.idPedido} cancelado);}// Enviar mensajefunction enviarMensaje() {  let idChurrero = parseInt(document.getElementById("mensajeChurrero").value);  let texto = document.getElementById("mensajeTexto").value;  if(!texto) return;  let msg = {    idMensaje: mensajes.length + 1,    idUsuario: 1,    idChurrero: idChurrero,    mensaje: texto,    fecha: new Date().toLocaleString()  };  mensajes.push(msg);  guardarDatos();  mostrarMensajes();}// Mostrar mensajesfunction mostrarMensajes() {  let div = document.getElementById("mensajes");  div.innerHTML = "";  mensajes.forEach(m => {    let c = churreros.find(ch => ch.idChurrero === m.idChurrero);    let msgDiv = document.createElement("div");    msgDiv.className = "mensaje";    msgDiv.innerHTML = <b>${c.nombreVendedor}</b>: ${m.mensaje} <i>(${m.fecha})</i>;    div.appendChild(msgDiv);  });}// Administrar productosfunction mostrarProductos() {  let select = document.getElementById("productoSelect");  let lista = document.getElementById("listaProductos");  select.innerHTML = "";  lista.innerHTML = "";  productos.forEach(p => {    let opt = document.createElement("option");    opt.value = p.idProducto;    opt.text = ${p.nombre} - $${p.precio};    select.add(opt);    let div = document.createElement("div");    div.innerHTML = <b>${p.nombre}</b> - ${p.descripcion} - Precio: $${p.precio};    lista.appendChild(div);  });}// Actualizar precio de un productofunction actualizarPrecio() {  let idProd = parseInt(document.getElementById("productoSelect").value);  let nuevoPrecio = parseFloat(document.getElementById("nuevoPrecio").value);  let prod = productos.find(p => p.idProducto === idProd);  if(prod && nuevoPrecio > 0) {    prod.precio = nuevoPrecio;    guardarDatos();    mostrarProductos();    alert(Precio de ${prod.nombre} actualizado a $${nuevoPrecio});  }}// Actualizar horario de un churrerofunction actualizarHorario(idChurrero, nuevoHorario) {  let ch = churreros.find(c => c.idChurrero === idChurrero);  if(ch) {    ch.horario = nuevoHorario;    guardarDatos();    mostrarChurrerosSelect();    alert(Horario de ${ch.nombreVendedor} actualizado a ${nuevoHorario});  }}// InicializarmostrarChurrerosSelect();mostrarPedidos();mostrarMensajes();mostrarProductos();</script>
